# Simple workflow for deploying static content to GitHub Pages
name: Deploy SPA content to Pages

on:
  # Runs on pushes targeting the default branch
  workflow_run:
    workflows: [ 'Node.js CI' ]
    types: [completed]
    branches: [ 'master' ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Define reusable artifact name variable
env:
  ARTIFACT_NAME: ${{ github.event.repository.name }}-gh-pages

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job: compile and create pages artifact
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Use Node.js ${{ vars.BUILD_NODE_VERSION || '22.x' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ vars.BUILD_NODE_VERSION || '22.x' }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Setup Pages (for BASE_URL)
      id: configuration
      uses: actions/configure-pages@v5
    - name: Build
      run: npm run build
      env:
        BASE_URL: ${{ steps.configuration.outputs.base_path }}
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: './dist'

  # Deploy job: takes artifact produced above and publishes to Pages
  deploy:
    needs: build
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        artifact_name: ${{ env.ARTIFACT_NAME }}
